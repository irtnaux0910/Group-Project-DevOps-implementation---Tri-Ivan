<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <div class="col-md-6 mx-auto">
        <h3>Member Enrollment Form</h3>
        <hr>
        <form th:action="@{/save}" th:object="${member}" method="post" class="card p-4">
            <div class="mb-3">
                <label>Member Name</label>
                <input type="text" th:field="*{memberName}" class="form-control">
                <small class="text-danger" th:if="${#fields.hasErrors('memberName')}" th:errors="*{memberName}"></small>
            </div>
            <div class="mb-3">
                <label>Phone Number</label>
                <input type="text" th:field="*{telephoneNumber}" class="form-control" placeholder="10 digits">
                <small class="text-danger" th:if="${#fields.hasErrors('telephoneNumber')}" th:errors="*{telephoneNumber}"></small>
            </div>
            <div class="mb-3">
                <label>Date of Birth</label>
                <input type="date" th:field="*{dateOfBirth}" class="form-control">
                <small class="text-danger" th:if="${#fields.hasErrors('dateOfBirth')}" th:errors="*{dateOfBirth}"></small>
            </div>
            <div class="mb-3">
                <label>Monthly Fee (CAD)</label>
                <input type="number" step="0.01" th:field="*{monthlyFee}" class="form-control">
                <small class="text-danger" th:if="${#fields.hasErrors('monthlyFee')}" th:errors="*{monthlyFee}"></small>
            </div>
            <div class="mb-3">
                <label>Payment Status</label>
                <select th:field="*{paymentStatus}" class="form-select">
                    <option value="Paid">Paid</option>
                    <option value="Pending">Pending</option>
                    <option value="Overdue">Overdue</option>
                </select>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">Confirm Enrollment</button>
                <a th:href="@{/}" class="btn btn-light border">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
