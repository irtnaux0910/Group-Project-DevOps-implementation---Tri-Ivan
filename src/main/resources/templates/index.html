<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Wellness Center</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <div class="p-5 mb-4 bg-light rounded-3">
        <h2>Wellness Center Management</h2>
        <p>Manage memberships and payment status effectively.</p>
    </div>

    <div class="row mb-3">
        <div class="col-md-6">
            <a th:href="@{/add}" class="btn btn-primary">Register New Member</a>
            <a th:href="@{/}" class="btn btn-outline-secondary">Show All</a>
        </div>
        <form th:action="@{/search}" method="get" class="col-md-6 d-flex">
            <select name="status" class="form-select me-2">
                <option value="Paid">Paid</option>
                <option value="Pending">Pending</option>
                <option value="Overdue">Overdue</option>
            </select>
            <button type="submit" class="btn btn-success">Filter Status</button>
        </form>
    </div>

    <table class="table table-striped border">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Phone</th>
                <th>DOB</th>
                <th>Fee (CAD)</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="m : ${members}">
                <td th:text="${m.memberId}"></td>
                <td th:text="${m.memberName}"></td>
                <td th:text="${m.telephoneNumber}"></td>
                <td th:text="${m.dateOfBirth}"></td>
                <td th:text="${m.monthlyFee}"></td>
                <td>
                    <span th:classappend="${m.paymentStatus == 'Paid'} ? 'badge bg-success' : (${m.paymentStatus == 'Overdue'} ? 'badge bg-danger' : 'badge bg-warning')"
                          th:text="${m.paymentStatus}"></span>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="alert alert-info">
        <strong>System Analytics:</strong> Total Registered Members: <span th:text="${total}"></span>
    </div>
</body>
</html>
