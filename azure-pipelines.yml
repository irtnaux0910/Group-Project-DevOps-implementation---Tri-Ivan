trigger:
- main

pool:
  name: 'Default' # This uses your local laptop agent

stages:
- task: Maven@3
      displayName: 'Compile and Test Java'
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'clean package'
        options: '-DskipTests' # Keeps it fast for your demo
        publishJUnitResults: true
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.17'
        mavenVersionOption: 'Path' # Tell it we are providing a specific path
        mavenPath: 'C:\Program Files\apache-maven-3.9.12\bin' # This matches your terminal output

- stage: Deliver
  displayName: 'Deliver Stage'
  dependsOn: Build
  jobs:
  - job: Publish
    steps:
    - script: echo "Generating Java .jar artifact..."

- stage: Deploy_Dev
  displayName: 'Deploy to Dev'
  dependsOn: Deliver
  jobs:
  - deployment: Dev
    environment: 'Dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo "Launching Spring Boot App in Dev..."

- stage: Deploy_QAT
  displayName: 'Deploy to QAT'
  dependsOn: Deploy_Dev
  jobs:
  - deployment: QAT
    environment: 'QAT'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo "Running QAT tests..."

- stage: Deploy_Staging
  displayName: 'Deploy to Staging'
  dependsOn: Deploy_QAT
  jobs:
  - deployment: Staging
    environment: 'Staging'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo "Deploying to Staging..."

- stage: Deploy_Prod
  displayName: 'Deploy to Production'
  dependsOn: Deploy_Staging
  jobs:
  - deployment: Production
    environment: 'Production'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo "Final Production Deployment Successful!"
