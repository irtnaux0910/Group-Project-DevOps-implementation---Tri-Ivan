trigger:
- main

pool: default

stages:
- stage: Build
  displayName: 'Build and Test'
  jobs:
  - job: Compile
    steps:
    - script: dotnet build
      displayName: 'Compile Project'
    - script: dotnet test  
      displayName: 'Run Unit Tests'

- stage: Deliver
  displayName: 'Deliver Artifact'
  dependsOn: Build
  jobs:
  - job: Publish
    steps:
    - script: echo "Generating build artifact..."

- stage: Deploy_Dev
  displayName: 'Deploy to Development'
  dependsOn: Deliver
  jobs:
  - deployment: Dev
    environment: 'Dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo "Launching Deployed App in Dev..."

- stage: Deploy_QAT
  displayName: 'Deploy to QAT'
  dependsOn: Deploy_Dev
  jobs:
  - deployment: QAT
    environment: 'QAT'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo "Deploying to QAT environment..."
