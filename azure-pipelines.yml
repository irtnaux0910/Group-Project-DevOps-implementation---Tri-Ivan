trigger:
- main

pool:
  name: 'Default' # This uses your laptop as the agent to fix the parallelism error

stages:
- stage: Build
  displayName: 'Build and Test'
  jobs:
  - job: Compile
    steps:
    # This step compiles the C# code
    - script: dotnet build
      displayName: 'Compile Project'
      workingDirectory: '$(Build.SourcesDirectory)' 

    # This step fulfills the Unit Test requirement
    - script: dotnet test
      displayName: 'Run Unit Tests'
      workingDirectory: '$(Build.SourcesDirectory)'

- stage: Deliver
  displayName: 'Deliver Artifact'
  dependsOn: Build
  jobs:
  - job: Publish
    steps:
    - script: echo "Generating build artifact..."

- stage: Deploy_Dev
  displayName: 'Deploy to Dev'
  dependsOn: Deliver
  jobs:
  - deployment: Dev
    environment: 'Dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo "Launching Deployed App in Dev..."

- stage: Deploy_QAT
  displayName: 'Deploy to QAT'
  dependsOn: Deploy_Dev
  jobs:
  - deployment: QAT
    environment: 'QAT'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo "Running QAT automated tests..."

- stage: Deploy_Staging
  displayName: 'Deploy to Staging'
  dependsOn: Deploy_QAT
  jobs:
  - deployment: Staging
    environment: 'Staging'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo "Preparing Staging environment..."

- stage: Deploy_Prod
  displayName: 'Deploy to Production'
  dependsOn: Deploy_Staging
  jobs:
  - deployment: Production
    environment: 'Production'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo "Final Production Deployment Successful!"
